spring.application.name=${SPRING_APPLICATION_NAME:makemytrip}
server.port=${SERVER_PORT:8080}
# MongoDB connection URI - Set via MONGODB_URI environment variable
# Default: mongodb://localhost:27017/makemytrip (local development)
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/makemytrip}
spring.data.mongodb.database=makemytrip
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
