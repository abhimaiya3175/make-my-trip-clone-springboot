spring.application.name=${SPRING_APPLICATION_NAME:makemytrip}
server.port=${SERVER_PORT:8080}

# MongoDB
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/makemytrip}
spring.data.mongodb.database=${MONGODB_DATABASE:makemytrip}
spring.data.mongodb.auto-index-creation=${MONGODB_AUTO_INDEX:true}

# JWT (for current/future auth integration)
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# Web Push (VAPID)
vapid.public.key=${VAPID_PUBLIC_KEY:replace-with-generated-vapid-public-key}
vapid.private.key=${VAPID_PRIVATE_KEY:replace-with-generated-vapid-private-key}
vapid.subject=${VAPID_SUBJECT:mailto:admin@example.com}

# Admin bootstrap credentials (for seeding/admin init flows)
app.admin.email=${ADMIN_EMAIL:admin@makemytrip.local}
app.admin.password=${ADMIN_PASSWORD:change-admin-password}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}
app.cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS,PATCH}
app.cors.allowed-headers=${CORS_ALLOWED_HEADERS:*}
app.cors.allow-credentials=${CORS_ALLOW_CREDENTIALS:true}
app.cors.max-age=${CORS_MAX_AGE:3600}

# Logging
logging.level.root=${LOGGING_LEVEL_ROOT:INFO}
logging.level.com.makemytrip=${LOGGING_LEVEL_APP:INFO}
logging.level.org.springframework=${LOGGING_LEVEL_SPRING:WARN}
logging.pattern.console=${LOGGING_PATTERN_CONSOLE:%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n}

# Actuator (recommended for production operations)
management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_EXPOSURE:health,info,metrics}
management.endpoint.health.show-details=${MANAGEMENT_HEALTH_DETAILS:when_authorized}

# Uploads
app.upload.dir=${UPLOAD_DIR:./uploads/reviews/}
